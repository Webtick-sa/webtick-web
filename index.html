<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webtick SA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { opacity: 0; transform: translateY(20px); transition: all 0.8s ease; }
    .fade-in.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body class="bg-black text-white font-sans">

  <!-- HERO -->
  <section class="min-h-screen flex flex-col justify-center items-center text-center px-6 fade-in">
    <h1 class="text-4xl md:text-7xl font-bold mb-6">Webtick SA</h1>
    <p class="max-w-3xl text-gray-400 mb-6">Scaling brands through high-impact digital systems.</p>
    <button onclick="bookCall()" class="px-8 py-4 bg-white text-black rounded-xl text-lg">Book a Call</button>
  </section>

  <!-- PRICING -->
  <section class="py-20 px-6 text-center fade-in">
    <h2 class="text-3xl font-semibold mb-12">Pricing</h2>
    <div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">

      <div class="bg-white/5 p-8 rounded-2xl border border-white/10">
        <h3 class="text-xl font-semibold mb-4">Project Only</h3>
        <p class="text-3xl font-bold mb-4">R50,000</p>
        <p class="text-gray-400 mb-6">Full system build and delivery</p>
        <button onclick="startProject()" class="px-6 py-3 bg-white text-black rounded-lg">Get Started</button>
      </div>

      <div class="bg-white p-8 rounded-2xl text-black">
        <h3 class="text-xl font-semibold mb-4">Fully Managed</h3>
        <p class="text-3xl font-bold mb-4">R50,000 + R4,000/mo</p>
        <p class="mb-6">We build, host, maintain, and manage everything</p>
        <button onclick="whatsapp()" class="px-6 py-3 bg-black text-white rounded-lg">Start Now</button>
      </div>

    </div>
  </section>

  <!-- LEAD FORM -->
  <section class="py-20 px-6 text-center fade-in">
    <h2 class="text-3xl font-semibold mb-6">Start Your Project</h2>
    <form id="leadForm" class="max-w-xl mx-auto space-y-4">
      <input type="text" placeholder="Full Name" required class="w-full p-3 rounded bg-white/10" />
      <input type="email" placeholder="Email" required class="w-full p-3 rounded bg-white/10" />
      <input type="text" placeholder="Business / Project" class="w-full p-3 rounded bg-white/10" />
      <textarea placeholder="Project Details" class="w-full p-3 rounded bg-white/10"></textarea>
      <button type="submit" class="w-full py-3 bg-white text-black rounded-lg">Submit</button>
    </form>
  </section>

  <!-- WHATSAPP FLOAT -->
  <button onclick="whatsapp()" class="fixed bottom-6 right-6 bg-green-500 p-4 rounded-full">💬</button>

  <footer class="py-10 border-t border-white/10 text-center text-gray-500">
    <p>© Webtick SA (Pty) Ltd</p>
  </footer>

  <script>
    function whatsapp() {
      window.open('https://wa.me/27700000000', '_blank');
    }

    function bookCall() {
      window.location.href = '#';
    }

    function startProject() {
      window.location.href = '#';
    }

    // FORM → ZAPIER WEBHOOK
    document.getElementById('leadForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const data = {
        name: this[0].value,
        email: this[1].value,
        business: this[2].value,
        details: this[3].value
      };

      await fetch('https://hooks.zapier.com/hooks/catch/XXXXXXX/XXXXXXX', {
        method: 'POST',
        body: JSON.stringify(data)
      });

      alert('Submitted successfully');
      this.reset();
    });

    // SCROLL ANIMATION
    const elements = document.querySelectorAll('.fade-in');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('show');
      });
    });
    elements.forEach(el => observer.observe(el));
  </script>

</body>
</html>
